version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: video-gen-app
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - ./storage:/app/storage
      - ./temp:/app/temp
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb
    networks:
      - video-gen-network
    command: npm run start:dev

  web:
    profiles:
      - frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: video-gen-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      VITE_API_URL: http://app:3000/api
    depends_on:
      - app
    networks:
      - video-gen-network
    command: npm run dev -- --host 0.0.0.0 --strictPort --port 5173

  redis:
    image: redis:7-alpine
    container_name: video-gen-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - video-gen-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

  mongodb:
    image: mongo:7-jammy
    container_name: video-gen-mongodb
    environment:
      MONGO_INITDB_DATABASE: video_generation
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db
    networks:
      - video-gen-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional: Bull Board for queue monitoring
  bull-board:
    profiles:
      - dev
    image: deadly0/bull-board
    container_name: video-gen-bull-board
    ports:
      - '3001:3000'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - video-gen-network

networks:
  video-gen-network:
    driver: bridge

volumes:
  redis-data:
  mongodb-data:

